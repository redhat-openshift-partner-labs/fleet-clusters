name: Archive deprovisioned cluster

on:
  deployment_status:

jobs:
  archive:
    if: >-
      github.event.deployment_status.state == 'success' &&
      github.event.deployment.environment == 'deprovision'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Extract cluster name
        id: cluster
        run: |
          CLUSTER_NAME="${{ github.event.deployment.payload.cluster_name }}"
          if [[ -z "$CLUSTER_NAME" ]]; then
            echo "::error::No cluster_name in deployment payload"
            exit 1
          fi
          echo "name=$CLUSTER_NAME" >> "$GITHUB_OUTPUT"

      - name: Validate paths exist
        run: |
          CLUSTER_NAME="${{ steps.cluster.outputs.name }}"
          if [[ ! -d "provision/$CLUSTER_NAME" ]]; then
            echo "::error::provision/$CLUSTER_NAME does not exist"
            exit 1
          fi
          if [[ ! -f "deprovision/$CLUSTER_NAME" ]]; then
            echo "::error::deprovision/$CLUSTER_NAME sentinel not found"
            exit 1
          fi

      - name: Archive cluster spec
        run: |
          CLUSTER_NAME="${{ steps.cluster.outputs.name }}"
          git mv "provision/$CLUSTER_NAME" "archive/$CLUSTER_NAME"
          rm "deprovision/$CLUSTER_NAME"

      - name: Commit and push
        run: |
          CLUSTER_NAME="${{ steps.cluster.outputs.name }}"
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add "archive/$CLUSTER_NAME" "deprovision/$CLUSTER_NAME"
          git commit -m "archive: $CLUSTER_NAME"
          git push
